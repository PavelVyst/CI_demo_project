name: CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh staging data
        run: python scripts/refresh_metadata.py

      - name: Run app
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 > app.log 2>&1 &
          sleep 2
          cat app.log || true
          
      - name: Debug process
        run: |
          ps aux | grep uvicorn || true
          pwd
          ls -la
          ls -la app
          ls -la data
          cat data/metadata.json || true
          
      - name: Wait for app
        run: |
          for i in {1..10}; do
            if curl -fss http://localhost:8000/health; then
              echo "App is up"
              exit 0
            fi
            echo "Waiting..."
            sleep 1
          done
          echo "App did not start"
          exit 1
          
      - name: Show app log
        run: cat app.log || true
        
      - name: Smoke test
        run: python scripts/smoke_test.py
